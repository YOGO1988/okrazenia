<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO&GO Lap - System Liczenia Okrążeń</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // SVG Icons
        const Icons = {
            Trophy: () => (
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
                </svg>
            ),
            Upload: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
            ),
            Download: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            ),
            Trash: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            ),
            Plus: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
                </svg>
            ),
            Minus: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20 12H4" />
                </svg>
            ),
            Wifi: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
                </svg>
            ),
            WifiOff: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
                </svg>
            ),
            Eye: () => (
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
            ),
            Gun: () => (
                <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm6 9.09c0 4-2.55 7.7-6 8.83-3.45-1.13-6-4.82-6-8.83v-4.7l6-2.25 6 2.25v4.7z"/>
                </svg>
            ),
            Save: () => (
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
            )
        };

        const LapCounterApp = () => {
          const [activeTab, setActiveTab] = useState('upload');
          const [chronotrackData, setChronotrackData] = useState([]);
          const [participantsData, setParticipantsData] = useState([]);
          const [gunStart, setGunStart] = useState(null);
          const [allGunStarts, setAllGunStarts] = useState([]);
          const [deletedReadings, setDeletedReadings] = useState(new Set());
          const [minLapTime, setMinLapTime] = useState(40);
          const [lapDistance, setLapDistance] = useState(1.0);
          const [customDistance, setCustomDistance] = useState('');
          
          // Event settings
          const [eventName, setEventName] = useState('Wyścig');
          
          // Kategorie wiekowe
          const [ageCategories, setAgeCategories] = useState([
            { name: 'M20', minAge: 18, maxAge: 29, gender: 'M' },
            { name: 'M30', minAge: 30, maxAge: 39, gender: 'M' },
            { name: 'M40', minAge: 40, maxAge: 49, gender: 'M' },
            { name: 'M50', minAge: 50, maxAge: 59, gender: 'M' },
            { name: 'M60', minAge: 60, maxAge: 99, gender: 'M' },
            { name: 'K20', minAge: 18, maxAge: 29, gender: 'K' },
            { name: 'K30', minAge: 30, maxAge: 39, gender: 'K' },
            { name: 'K40', minAge: 40, maxAge: 49, gender: 'K' },
            { name: 'K50', minAge: 50, maxAge: 59, gender: 'K' },
            { name: 'K60', minAge: 60, maxAge: 99, gender: 'K' }
          ]);
          const [excludeOpenWinners, setExcludeOpenWinners] = useState(false);
          const [openWinnersToExclude, setOpenWinnersToExclude] = useState(3); // Top 3 OPEN wykluczani
          const [firstReadIsStart, setFirstReadIsStart] = useState(true); // false = pierwszy odczyt = zaliczone okrążenie; true = pierwszy odczyt = start zawodnika
          
          // WebSocket Bridge (ChronoTrack CCS)
          const [wsConnected, setWsConnected] = useState(false);
          const [wsUrl, setWsUrl] = useState('ws://192.168.1.100:8081');
          const [liveMode, setLiveMode] = useState(false);
          const [lastReading, setLastReading] = useState(null);
          const [lastFinisher, setLastFinisher] = useState(null); // Ostatni zawodnik na mecie
          const wsRef = useRef(null);
          const reconnectTimeoutRef = useRef(null);
          
          // WebSocket Results Server (Broadcast)
          const [resultsServerUrl, setResultsServerUrl] = useState('ws://192.168.1.100:3002');
          const [resultsServerConnected, setResultsServerConnected] = useState(false);
          const resultsWsRef = useRef(null);

          // HTTP Publish (CyberFolks / serwer WWW)
          const [httpPublishUrl, setHttpPublishUrl] = useState('');
          const [httpPublishToken, setHttpPublishToken] = useState('yogo2025');
          const [httpPublishEnabled, setHttpPublishEnabled] = useState(false);
          const [httpPublishStatus, setHttpPublishStatus] = useState(null); // null | 'ok' | 'error'
          const [httpPublishLastAt, setHttpPublishLastAt] = useState(null);
          const httpPublishThrottleRef = useRef(null);

          // Public View Mode
          const [publicViewMode, setPublicViewMode] = useState(false);
          const [publicViewType, setPublicViewType] = useState('top5'); // 'top5', 'wyniki', 'meta'
          
          // Broadcast View State (MUSI być tutaj, nie w if!)
          const [currentTime, setCurrentTime] = useState(Date.now());
          const [scrollPosition, setScrollPosition] = useState(0);
          const [animatedIndex, setAnimatedIndex] = useState(0); // Który medal w WYNIKI (0-4)
          const [categoryAnimationIndex, setCategoryAnimationIndex] = useState(0); // Indeks kategorii w TOP5
          
          // Auto-save
          const [autoSaveEnabled, setAutoSaveEnabled] = useState(true);
          const [lastSaveTime, setLastSaveTime] = useState(null);
          
          // Load data from localStorage on mount
          useEffect(() => {
            const saved = localStorage.getItem('yogo_lap_data');
            if (saved) {
              try {
                const data = JSON.parse(saved);
                if (data.chronotrackData) setChronotrackData(data.chronotrackData);
                if (data.participantsData) setParticipantsData(data.participantsData);
                if (data.gunStart) setGunStart(data.gunStart);
                if (data.deletedReadings) setDeletedReadings(new Set(data.deletedReadings));
                if (data.lapDistance !== undefined) setLapDistance(data.lapDistance);
                if (data.minLapTime !== undefined) setMinLapTime(data.minLapTime);
                if (data.allGunStarts) setAllGunStarts(data.allGunStarts);
                if (data.eventName) setEventName(data.eventName);
                if (data.ageCategories) setAgeCategories(data.ageCategories);
                if (data.excludeOpenWinners !== undefined) setExcludeOpenWinners(data.excludeOpenWinners);
                if (data.openWinnersToExclude !== undefined) setOpenWinnersToExclude(data.openWinnersToExclude);
                if (data.customDistance !== undefined) setCustomDistance(data.customDistance);
                if (data.firstReadIsStart !== undefined) setFirstReadIsStart(data.firstReadIsStart);
                if (data.httpPublishUrl) setHttpPublishUrl(data.httpPublishUrl);
                if (data.httpPublishToken) setHttpPublishToken(data.httpPublishToken);
                if (data.httpPublishEnabled !== undefined) setHttpPublishEnabled(data.httpPublishEnabled);
                console.log('✅ Dane wczytane z localStorage');
              } catch (e) {
                console.error('Błąd wczytywania danych:', e);
              }
            }
          }, []);

          // Auto-save every 30 seconds
          useEffect(() => {
            if (!autoSaveEnabled) return;
            
            const interval = setInterval(() => {
              saveToLocalStorage();
            }, 30000);
            
            return () => clearInterval(interval);
          }, [autoSaveEnabled, chronotrackData, participantsData, gunStart, deletedReadings, lapDistance, minLapTime, allGunStarts, eventName, ageCategories, excludeOpenWinners, openWinnersToExclude, customDistance]);

          // Debug chronotrackData changes
          useEffect(() => {
            console.log(`🔄 chronotrackData ZMIENIŁ SIĘ: ${chronotrackData.length} odczytów`);
            if (chronotrackData.length > 0) {
              console.log(`   Pierwszy: ${chronotrackData[0].tag} (${chronotrackData[0].datetime})`);
              console.log(`   Ostatni: ${chronotrackData[chronotrackData.length-1].tag} (${chronotrackData[chronotrackData.length-1].datetime})`);
            }
          }, [chronotrackData.length]);

          const saveToLocalStorage = () => {
            try {
              const data = {
                chronotrackData,
                participantsData,
                gunStart,
                deletedReadings: Array.from(deletedReadings),
                lapDistance,
                minLapTime,
                allGunStarts,
                eventName,
                ageCategories,
                excludeOpenWinners,
                openWinnersToExclude,
                customDistance,
                firstReadIsStart,
                httpPublishUrl,
                httpPublishToken,
                httpPublishEnabled,
                savedAt: new Date().toISOString()
              };
              localStorage.setItem('yogo_lap_data', JSON.stringify(data));
              setLastSaveTime(new Date());
              console.log('💾 Auto-zapis wykonany');
            } catch (e) {
              console.error('Błąd zapisu:', e);
            }
          };

          const parseUnixTimestamp = (timestamp) => {
            const ts = parseFloat(timestamp);
            return new Date(ts * 1000);
          };

          // ========== WEBSOCKET BRIDGE (ChronoTrack CCS) ==========
          const connectWebSocket = () => {
            if (wsRef.current) {
              wsRef.current.close();
            }

            try {
              console.log('🔌 Łączenie z bridge:', wsUrl);
              const ws = new WebSocket(wsUrl);
              wsRef.current = ws;

              ws.onopen = () => {
                console.log('✅ Połączono z bridge');
                setWsConnected(true);
                
                // Heartbeat - ping co 20s
                if (ws.pingInterval) clearInterval(ws.pingInterval);
                ws.pingInterval = setInterval(() => {
                  if (ws.readyState === WebSocket.OPEN) {
                    try {
                      ws.send(JSON.stringify({ type: 'ping', timestamp: Date.now() }));
                    } catch (e) {
                      console.log('⚠️ Ping failed');
                    }
                  }
                }, 20000);
              };

              ws.onmessage = (event) => {
                try {
                  const data = JSON.parse(event.data);
                  console.log('📨 Bridge message:', data.type);
                  
                  if (data.type === 'ccs_reading' && data.tag) {
                    handleLiveReading(data);
                  } else if (data.type === 'pong') {
                    // Heartbeat response - wszystko OK
                  } else {
                    console.log('📨 Inne:', data);
                  }
                } catch (error) {
                  console.error('❌ Błąd parsowania:', error);
                }
              };

              ws.onerror = (error) => {
                console.error('❌ Błąd WS:', error.type || 'Unknown');
                // Nie pokazuj szczegółów błędu bo Event object nie ma message
              };

              ws.onclose = (event) => {
                console.log('🔌 Rozłączono z bridge:', event.code, event.reason || 'No reason');
                setWsConnected(false);
                
                // Clear heartbeat
                if (ws.pingInterval) {
                  clearInterval(ws.pingInterval);
                  ws.pingInterval = null;
                }
                
                // Auto-reconnect jeśli live mode
                if (liveMode) {
                  console.log('   🔄 Reconnect za 5s...');
                  reconnectTimeoutRef.current = setTimeout(() => {
                    connectWebSocket();
                  }, 5000);
                }
              };
            } catch (error) {
              console.error('❌ Nie można połączyć:', error);
              setWsConnected(false);
            }
          };

          const disconnectWebSocket = () => {
            if (reconnectTimeoutRef.current) {
              clearTimeout(reconnectTimeoutRef.current);
            }
            if (wsRef.current) {
              wsRef.current.close();
              wsRef.current = null;
            }
            setWsConnected(false);
          };

          const handleLiveReading = (data) => {
            const tag = data.tag ? data.tag.trim().replace(/\r/g, '') : data.tag;
            const timeStr = data.time;
            const timestamp = data.timestamp;
            
            console.log('🔍 OTRZYMANO:', data);
            
            setLastReading({ tag, time: timeStr, timestamp });

            const now = new Date(timestamp);
            const unixTimestamp = now.getTime() / 1000;

            // NOWE: Sprawdź czy to event GUNSTART z bridge'a v1.3
            if (data.type === 'gunstart') {
              console.log('🔫 WYKRYTO GUNSTART Z BRIDGE (v1.3)!');
              console.log(`   Oryginalny tag: ${data.originalTag}, Kanał: ${data.channel}`);
              console.log(`   Urządzenie: ${data.device}, Sygnał: ${data.signalStrength}dBm`);
              
              const gunStartData = {
                timestamp: data.minitrackTime || unixTimestamp,
                datetime: now.toLocaleString('pl-PL'),
                reader: data.device || 'MiniTrack',
                raw: (data.minitrackTime || unixTimestamp).toFixed(2),
                originalTag: data.originalTag,
                channel: data.channel,
                gunStartId: data.gunStartId,
                signalStrength: data.signalStrength
              };
              setAllGunStarts(prev => [...prev, gunStartData]);
              setGunStart(data.minitrackTime || unixTimestamp);
              return;
            }

            // STARE: Check for GUNSTART (kompatybilność wsteczna)
            const tagUpper = String(tag).toUpperCase();
            if (tagUpper.includes('GUNSTART') || tagUpper === 'START' || tagUpper.includes('GUN')) {
              console.log('🔫 WYKRYTO GUNSTART (stary format)!');
              const gunStartData = {
                timestamp: unixTimestamp,
                datetime: now.toLocaleString('pl-PL'),
                reader: data.device || data.source || 'MiniTrack',
                raw: unixTimestamp.toFixed(2)
              };
              setAllGunStarts(prev => [...prev, gunStartData]);
              setGunStart(unixTimestamp);
              return;
            }

            const newReading = {
              id: `${tag}-${unixTimestamp}-${Date.now()}`,
              tag,
              timestamp: unixTimestamp,
              datetime: now.toLocaleString('pl-PL'),
              reader: data.device || data.source || 'MiniTrack',
              raw: unixTimestamp.toFixed(2)
            };

            setChronotrackData(prev => {
              const updated = [...prev, newReading];
              
              // NATYCHMIAST wyślij update do broadcast
              setTimeout(() => {
                if (resultsServerConnected) {
                  console.log('📤 Nowy odczyt - broadcast update');
                  sendResultsUpdate();
                }
              }, 100);
              
              return updated.sort((a, b) => a.timestamp - b.timestamp);
            });
          };

          useEffect(() => {
            if (liveMode) {
              connectWebSocket();
            } else {
              disconnectWebSocket();
            }
            return () => {
              disconnectWebSocket();
            };
          }, [liveMode, wsUrl]);

          // ========== WEBSOCKET RESULTS SERVER (BROADCAST) ==========
          const connectResultsServer = () => {
            if (resultsWsRef.current) {
              resultsWsRef.current.close();
            }

            try {
              const ws = new WebSocket(resultsServerUrl);
              resultsWsRef.current = ws;

              ws.onopen = () => {
                console.log('✅ Połączono z serwerem wyników');
                setResultsServerConnected(true);
                sendResultsUpdate();
              };

              ws.onerror = (error) => {
                console.error('❌ Błąd serwera wyników:', error);
              };

              ws.onclose = () => {
                console.log('🔌 Rozłączono z serwera wyników');
                setResultsServerConnected(false);
              };
            } catch (error) {
              console.error('❌ Nie można połączyć z serwerem wyników:', error);
              setResultsServerConnected(false);
            }
          };

          const disconnectResultsServer = () => {
            if (resultsWsRef.current) {
              resultsWsRef.current.close();
              resultsWsRef.current = null;
            }
            setResultsServerConnected(false);
          };

          const sendResultsUpdate = () => {
            if (resultsWsRef.current && resultsWsRef.current.readyState === WebSocket.OPEN) {
              const updateData = {
                type: 'results_update',
                participants: participantsData,
                results: results,
                gunStart: gunStart,
                lapDistance: lapDistance,
                eventName: eventName
              };
              resultsWsRef.current.send(JSON.stringify(updateData));
              console.log('📤 Wysłano aktualizację wyników');
            }
          };

          // Auto-broadcast results on change
          useEffect(() => {
            if (resultsServerConnected) {
              sendResultsUpdate();
              console.log('📤 Wysłano wyniki do broadcast server');
            }
          }, [results, participantsData, gunStart, lapDistance, eventName, resultsServerConnected]);

          // Dodatkowy trigger - przy nowych odczytach
          useEffect(() => {
            if (resultsServerConnected && chronotrackData.length > 0) {
              console.log('📤 Nowy odczyt - wysyłam update');
              sendResultsUpdate();
            }
          }, [chronotrackData]);

          // ========== HTTP PUBLISH (serwer WWW / CyberFolks) ==========
          const publishResultsHttp = () => {
            if (!httpPublishEnabled || !httpPublishUrl) return;

            // Throttle: nie wysyłaj częściej niż co 3 sekundy
            if (httpPublishThrottleRef.current) return;
            httpPublishThrottleRef.current = setTimeout(() => {
              httpPublishThrottleRef.current = null;
            }, 3000);

            const payload = JSON.stringify({
              type: 'results_update',
              participants: participantsData,
              results: results.map(({ lapDetails, ...r }) => r),
              gunStart: gunStart,
              lapDistance: lapDistance,
              eventName: eventName
            });

            // Content-Type: text/plain + token w URL = brak preflight OPTIONS
            const urlWithToken = httpPublishUrl + (httpPublishUrl.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(httpPublishToken);
            fetch(urlWithToken, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain' },
              body: payload
            })
              .then(r => r.json())
              .then(data => {
                if (data.ok) {
                  setHttpPublishStatus('ok');
                  setHttpPublishLastAt(new Date());
                } else {
                  setHttpPublishStatus('error');
                  console.error('❌ HTTP publish error:', data.error);
                }
              })
              .catch(err => {
                setHttpPublishStatus('error');
                console.error('❌ HTTP publish failed:', err.message);
              });
          };

          // Publikuj przy każdej zmianie wyników
          useEffect(() => {
            if (httpPublishEnabled && httpPublishUrl) {
              publishResultsHttp();
            }
          }, [results, gunStart, lapDistance, eventName, httpPublishEnabled]);

          // ========== FILE UPLOADS ==========
          
          // Parser surowych danych Chronotrack (format TO~)
          // Oficjalna struktura według Chronotrack:
          // TO~seq~TAG~timer~event~timestamp~readerMAC~port~RSSI~seqByReader~type~totalReads
          const parseChronotrackRawCSV = (text) => {
            const lines = text.split('\n').filter(line => line.trim());
            const readings = [];
            const fileId = Math.random().toString(36).substr(2, 9); // Unikalny ID dla pliku
            
            console.log(`📋 parseChronotrackRawCSV: ${lines.length} linii`);
            
            lines.forEach((line, index) => {
              // Format: TO~43~3~220~2~1413615526.80~10EC17~4~-57~80~P~56
              const fields = line.split('~');
              
              if (index < 3) {
                console.log(`   Linia ${index}: ${fields.length} pól, TAG="${fields[2]}", timestamp="${fields[5]}"`);
              }
              
              if (fields[0] === 'TO' && fields.length >= 12) {
                try {
                  const timestamp = parseFloat(fields[5]);
                  const tag = fields[2].trim();  // POPRAWKA: pole [2] to TAG!
                  const timerCode = fields[3];
                  const eventCode = fields[4];
                  const reader = fields[6];
                  const port = fields[7];
                  const rssi = parseInt(fields[8]);
                  const totalReads = fields[11];
                  
                  if (!isNaN(timestamp) && tag) {
                    readings.push({
                      id: `raw-${fileId}-${index}-${timestamp}`, // UNIKALNE ID!
                      tag: tag,
                      raw: fields[5],
                      timestamp: timestamp,
                      datetime: parseUnixTimestamp(fields[5]).toLocaleString('pl-PL'),
                      reader: reader,
                      port: port,
                      antenna: port, // Port = antenna
                      rssi: rssi,
                      timerCode: timerCode,
                      eventCode: eventCode,
                      totalReads: totalReads,
                      source: 'chronotrack_raw'
                    });

          const handleParticipantsUpload = (e) => {

              // Rozpoznaj separator

              const separator = firstLine.includes(';') ? ';' : ',';
              console.log('📋 Separator:', separator === ';' ? 'średnik' : 'przecinek');

              // Parsuj nagłówek
              const header = lines[0].toLowerCase().split(separator).map(h => h.trim());
              console.log('📋 Nagłówki:', header);

              // Znajdź indeksy kolumn - obsługa różnych nazw
              const tagIdx = header.findIndex(h =>

              );
              const bibIdx = header.findIndex(h => 
                h === 'bib' || h === 'numer' || h === 'number' || h === 'nr'
              );
              const firstNameIdx = header.findIndex(h => 
                h === 'firstname' || h === 'first' || h === 'imie' || h === 'imię' || h === 'name'
              );
              const lastNameIdx = header.findIndex(h =>

              );
              const genderIdx = header.findIndex(h =>

              );
              const cityIdx = header.findIndex(h =>

              const clubIdx = header.findIndex(h =>

              );

                  );

                    else if (age < 23) category = 'U23';
                    else if (age < 30) category = '20-29';
                    else if (age < 35) category = '30-34';
                    else if (age < 40) category = '35-39';
                    else if (age < 45) category = '40-44';
                    else if (age < 50) category = '45-49';
                    else if (age < 55) category = '50-54';
                    else if (age < 60) category = '55-59';
                    else if (age < 65) category = '60-64';
                    else if (age < 70) category = '65-69';

                  lastName: lastNameIdx >= 0 ? (parts[lastNameIdx] || '') : '',
                  gender: gender,

              }

                  if (existingIndex >= 0) {
                    // TAG już istnieje - AKTUALIZUJ dane

                    console.log(`✏️ Zaktualizowano TAG ${newParticipant.tag}: ${newParticipant.firstName} ${newParticipant.lastName}`);
                  } else {

                    addedCount++;
                    console.log(`➕ Dodano TAG ${newParticipant.tag}: ${newParticipant.firstName} ${newParticipant.lastName}`);
                  }
                });
                
                console.log('📋 Nowe dane (po merge):', merged);
                
                alert(`✅ Wczytano ${newData.length} uczestników:\n` +
                      `   • Zaktualizowano: ${updatedCount}\n` +

                      `💾 Zapisuję automatycznie...\n\n` +
                      `Odśwież stronę (F5) żeby zobaczyć zmiany w wynikach!`);
                
                // Wymuszam zapis

                return merged;
              });

            reader.readAsText(file);

          // ========== MANUAL CONTROLS ==========

          const setCustomGunStart = () => {
            const input = prompt(
              'Wpisz Gun Start:\n\n' +
              '1. Unix timestamp (np: 1761390812.59)\n' +
              '2. Data i godzina (np: 2025-10-25 10:58:12)\n' +
              '3. Tylko godzina dzisiaj (np: 10:58:12)\n\n' +
              'Wpisz wartość:'
            );
            
            if (!input || input.trim() === '') return;
            
            let timestamp;
            const trimmed = input.trim();
            
            // 1. Unix timestamp (liczba z kropką)
            if (/^\d+\.?\d*$/.test(trimmed)) {
              timestamp = parseFloat(trimmed);
            }
            // 2. Pełna data i czas (YYYY-MM-DD HH:MM:SS)
            else if (/^\d{4}-\d{2}-\d{2}\s+\d{1,2}:\d{2}(:\d{2})?$/.test(trimmed)) {
              const date = new Date(trimmed);
              if (isNaN(date.getTime())) {
                alert('❌ Nieprawidłowy format daty!');
                return;
              }
              timestamp = date.getTime() / 1000;
            }
            // 3. Tylko czas (HH:MM:SS lub HH:MM)
            else if (/^\d{1,2}:\d{2}(:\d{2})?$/.test(trimmed)) {
              const now = new Date();
              const [hours, minutes, seconds = '0'] = trimmed.split(':');
              now.setHours(parseInt(hours));
              now.setMinutes(parseInt(minutes));
              now.setSeconds(parseInt(seconds));
              now.setMilliseconds(0);
              timestamp = now.getTime() / 1000;

          const removeLastLap = (tag) => {
            const participantReadings = chronotrackData
              .filter(r => r.tag === tag && !deletedReadings.has(r.id) && (!gunStart || r.timestamp >= gunStart))
              .sort((a, b) => b.timestamp - a.timestamp);
            
            if (participantReadings.length > 0) {
              deleteReading(participantReadings[0].id);
              alert(`➖ Usunięto ostatnie okrążenie dla TAG: ${tag}`);
            }
          };

          // ========== RESULTS CALCULATION ==========
          const results = useMemo(() => {
            if (!gunStart) return [];

            const activeReadings = chronotrackData.filter(r => 
              !deletedReadings.has(r.id) && r.timestamp >= gunStart
            );
            
            console.log(`🔍 RESULTS: ${activeReadings.length} odczytów, ${participantsData.length} uczestników`);

            const byTag = {};
            activeReadings.forEach(reading => {
              const cleanTag = reading.tag ? reading.tag.replace(/\r/g, '').trim() : reading.tag;
              if (!byTag[cleanTag]) {
                byTag[cleanTag] = [];
              }
              byTag[cleanTag].push(reading);
            });

            return Object.entries(byTag).map(([tag, readings]) => {
              const sortedReadings = readings.sort((a, b) => a.timestamp - b.timestamp);
              const filteredLaps = [];
              let lastValidTime = gunStart;

              sortedReadings.forEach(reading => {
                // Ręczne okrążenia (dodane przez admina) pomijają filtr minLapTime
                const isManualReading = reading.isManual === true;
                const meetsTimeLimit = reading.timestamp - lastValidTime >= minLapTime;
                
                if (isManualReading || meetsTimeLimit) {
                  filteredLaps.push(reading);
                  lastValidTime = reading.timestamp;
                }
              });

              const participant = participantsData.find(p => p.tag === tag);
              
              if (!participant && filteredLaps.length > 0) {
                console.warn(`⚠️ Brak uczestnika dla TAG="${tag}" (${filteredLaps.length} okrążeń)`);

              const participantInfo = participant || {
                bib: '?',
                firstName: 'Nieznany',
                lastName: 'Zawodnik',
                gender: '',
                city: '',
                club: ''
              };

              // Tryb liczenia okrążeń:
              // firstReadIsStart=false (domyślny): każdy odczyt = ukończone okrążenie
              // firstReadIsStart=true: pierwszy odczyt = start zawodnika, kolejne = ukończone okrążenia
              const completedLaps = firstReadIsStart
                ? Math.max(0, filteredLaps.length - 1)
                : filteredLaps.length;

              const totalTime = filteredLaps.length > 0
                ? filteredLaps[filteredLaps.length - 1].timestamp - gunStart
                : 0;

              return {

                bib: participantInfo.bib,
                firstName: participantInfo.firstName,
                lastName: participantInfo.lastName,

                city: participantInfo.city || '',
                club: participantInfo.club || '',
                laps: completedLaps,

                lapDetails: filteredLaps,
                totalTime,
                lastLapTime: filteredLaps.length > 0 ? filteredLaps[filteredLaps.length - 1].timestamp : null
              };
            }).sort((a, b) => {

              return a.totalTime - b.totalTime;

            const mins = Math.floor(seconds / 60);

          const getTimeSinceLastReading = (lastLapTime) => {
            if (!lastLapTime) return null;
            const now = Date.now() / 1000;
            const timeSince = now - lastLapTime;
            
            if (timeSince < 60) {
              return `${Math.floor(timeSince)}s`;
            } else if (timeSince < 3600) {
              const minutes = Math.floor(timeSince / 60);
              const seconds = Math.floor(timeSince % 60);
              return `${minutes}m ${seconds}s`;
            } else {
              const hours = Math.floor(timeSince / 3600);
              const minutes = Math.floor((timeSince % 3600) / 60);
              return `${hours}h ${minutes}m`;
            }
          };

                                  <th className="border p-2 text-sm">Nazwisko</th>
                                  <th className="border p-2 text-sm">Płeć</th>
                                  <th className="border p-2 text-sm">M. w kat.</th>
                                  <th className="border p-2 text-sm">Kat. wiek.</th>
                                  <th className="border p-2 text-sm">Okrążenia</th>
                                  <th className="border p-2 text-sm">Dystans (km)</th>
                                  <th className="border p-2 text-sm">Czas</th>
                                  <th className="border p-2 text-sm">Akcje</th>
                                </tr>
                              </thead>
                              <tbody>
                                {resultsWithRanks.map((r, idx) => (
                                  <tr key={r.tag} className="hover:bg-blue-50">
                                    <td className="border p-2 text-center font-bold text-sm">{idx + 1}</td>
                                    <td className="border p-2 text-center text-sm">{r.bib}</td>
                                    <td className="border p-2 font-mono text-xs">{r.tag}</td>
                                    <td className="border p-2 text-sm">{r.firstName}</td>
                                    <td className="border p-2 text-sm">{r.lastName}</td>
                                    <td className="border p-2 text-center text-sm">
                                      {r.gender === 'M' ? 'M' : r.gender === 'K' ? 'K' : '-'}
                                    </td>
                                    <td className="border p-2 text-center font-semibold text-blue-600 text-sm">
                                      {r.genderRank || '-'}
                                    </td>
                                    <td className="border p-2 text-center text-xs">
                                      {r.category || '-'}
                                      {r.categoryRank && <div className="text-xs text-gray-600">#{r.categoryRank}</div>}
                                      {r.isExcludedFromCategory && (
                                        <div className="text-xs text-orange-600 font-semibold mt-1">
                                          🏆 OPEN
                                        </div>
                                      )}
                                    </td>
                                    <td className="border p-2 text-center font-bold text-sm">{r.laps}</td>
                                    <td className="border p-2 text-center font-bold text-blue-600 text-sm">{r.distance} km</td>
                                    <td className="border p-2 text-center font-mono text-sm">
                                      <div>{formatTime(r.totalTime)}</div>
                                      {r.lastLapTime && (
                                        <div className="text-xs text-red-600 mt-1">
                                          od {getTimeSinceLastReading(r.lastLapTime)}
                                        </div>
                                      )}
                                    </td>
                                    <td className="border p-2">
                                      <div className="flex gap-1 justify-center">
                                        <button
                                          onClick={() => addManualLap(r.tag)}
                                          className="flex items-center gap-1 bg-green-500 text-white px-2 py-1 rounded text-xs hover:bg-green-600"
                                        >
                                          <Icons.Plus /> Dodaj
                                        </button>
                                        <button
                                          onClick={() => removeLastLap(r.tag)}
                                          className="flex items-center gap-1 bg-red-500 text-white px-2 py-1 rounded text-xs hover:bg-red-600"
                                        >
                                          <Icons.Minus /> Usuń
                                        </button>
                                      </div>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        )}
                      </div>
                    )}

                    {/* LAPS TAB */}
                    {activeTab === 'laps' && (
                      <div>
                        <h2 className="text-2xl font-bold mb-6">Czasy okrążeń</h2>

                        {results.length === 0 ? (
                          <p className="text-gray-500 text-center py-8">Brak danych</p>
                        ) : (
                          <div className="space-y-6">
                            {results.map(r => (
                              <div key={r.tag} className="bg-gray-50 rounded-lg p-4">
                                <h3 className="font-bold text-lg mb-3">
                                  {r.bib} - {r.firstName} {r.lastName}
                                </h3>
                                <table className="w-full border-collapse text-sm">
                                  <thead>
                                    <tr className="bg-gray-200">
                                      <th className="border p-2">Nr</th>
                                      <th className="border p-2">Dystans (km)</th>
                                      <th className="border p-2">Czas okrążenia</th>
                                      <th className="border p-2">Czas od startu</th>
                                      <th className="border p-2">Data</th>
                                      <th className="border p-2">Akcja</th>
                                    </tr>
                                  </thead>
                                  <tbody>
                                    {r.lapDetails.map((lap, idx) => {
                                      const prevLap = idx > 0 ? r.lapDetails[idx - 1] : null;
                                      const lapDuration = prevLap ? lap.timestamp - prevLap.timestamp : (gunStart ? lap.timestamp - gunStart : null);
                                      const totalTime = gunStart ? lap.timestamp - gunStart : null;
                                      const distance = ((idx + 1) * lapDistance).toFixed(2);
                                      const isManual = lap.isManual === true;
                                      
                                      return (
                                        <tr key={lap.id} className={`hover:bg-gray-100 ${isManual ? 'bg-green-50' : ''}`}>
                                          <td className="border p-2 text-center">
                                            {idx + 1}
                                            {isManual && <span className="ml-1 text-green-600 font-bold" title="Okrążenie dodane ręcznie przez admina">✓</span>}
                                          </td>
                                          <td className="border p-2 text-center font-bold text-blue-600">{distance} km</td>
                                          <td className="border p-2 text-center font-mono">{formatTime(lapDuration)}</td>
                                          <td className="border p-2 text-center font-mono">{formatTime(totalTime)}</td>
                                          <td className="border p-2">
                                            {lap.datetime}
                                            {isManual && <span className="ml-2 text-xs bg-green-200 text-green-800 px-2 py-1 rounded">MANUAL</span>}
                                          </td>
                                          <td className="border p-2 text-center">
                                            <button
                                              onClick={() => {
                                                if (window.confirm(`Usunąć okrążenie ${idx + 1}?`)) {
                                                  deleteLapFromResults(r.tag, idx);
                                                }
                                              }}
                                              className="text-red-600 hover:text-red-800"
                                            >
                                              <Icons.Trash />
                                            </button>
                                          </td>
                                        </tr>
                                      );
                                    })}
                                  </tbody>
                                </table>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}

                    {/* MANAGE TAB */}
                    {activeTab === 'manage' && (
                      <div>
                        <h2 className="text-2xl font-bold mb-6">Zarządzaj odczytami</h2>

                        {chronotrackData.length === 0 ? (
                          <p className="text-gray-500 text-center py-8">Brak danych</p>
                        ) : (
                          <div className="overflow-x-auto">
                            <table className="w-full border-collapse text-sm">
                              <thead>
                                <tr className="bg-gray-100">
                                  <th className="border p-2">TAG</th>
                                  <th className="border p-2">Unix</th>
                                  <th className="border p-2">Data</th>
                                  <th className="border p-2">Czytnik</th>
                                  <th className="border p-2">Status</th>
                                  <th className="border p-2">Akcja</th>
                                </tr>
                              </thead>
                              <tbody>
                                {chronotrackData.map(reading => {
                                  const isDeleted = deletedReadings.has(reading.id);
                                  const isBeforeStart = gunStart && reading.timestamp < gunStart;
                                  
                                  return (
                                    <tr key={reading.id} className={isDeleted ? 'bg-red-50 opacity-50' : isBeforeStart ? 'bg-yellow-50' : 'hover:bg-blue-50'}>
                                      <td className="border p-2 font-mono">{reading.tag}</td>
                                      <td className="border p-2 font-mono text-xs">{reading.raw}</td>
                                      <td className="border p-2">{reading.datetime}</td>
                                      <td className="border p-2">{reading.reader}</td>
                                      <td className="border p-2 text-center">
                                        {isDeleted && <span className="text-red-600">Usunięty</span>}
                                        {!isDeleted && isBeforeStart && <span className="text-yellow-600">Przed startem</span>}
                                        {!isDeleted && !isBeforeStart && <span className="text-green-600">Aktywny</span>}
                                      </td>
                                      <td className="border p-2 text-center">
                                        {isDeleted ? (
                                          <button onClick={() => restoreReading(reading.id)} className="text-green-600 hover:text-green-800">
                                            Przywróć
                                          </button>
                                        ) : (
                                          <button onClick={() => deleteReading(reading.id)} className="text-red-600 hover:text-red-800">
                                            <Icons.Trash />
                                          </button>
                                        )}
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          </div>
                        )}
                      </div>
                    )}

                    {/* SETTINGS TAB */}
                    {activeTab === 'settings' && (
                      <div className="space-y-6">
                        <h2 className="text-2xl font-bold mb-6">⚙️ Ustawienia</h2>

                        {/* Kategorie wiekowe */}
                        <div className="bg-purple-50 border border-purple-200 rounded-lg p-6">
                          <h3 className="text-xl font-bold mb-4">🏆 Kategorie wiekowe</h3>
                          
                          {/* Opcja wykluczania zwycięzców OPEN */}
                          <div className="bg-white rounded-lg p-4 mb-4">
                            <div className="flex items-center gap-3 mb-3">
                              <input
                                type="checkbox"
                                id="excludeOpenWinners"
                                checked={excludeOpenWinners}
                                onChange={(e) => setExcludeOpenWinners(e.target.checked)}
                                className="w-5 h-5"
                              />
                              <label htmlFor="excludeOpenWinners" className="font-semibold text-lg">
                                Wyklucz zwycięzców OPEN z kategorii wiekowych
                              </label>
                            </div>
                            <p className="text-sm text-gray-600 mb-3">
                              Zapobiega podwójnemu nagradzaniu - zwycięzcy kategorii OPEN nie będą uwzględniani w kategoriach wiekowych
                            </p>
                            {excludeOpenWinners && (
                              <div className="flex items-center gap-2">
                                <span className="text-sm">Wyklucz TOP</span>
                                <input
                                  type="number"
                                  value={openWinnersToExclude}
                                  onChange={(e) => setOpenWinnersToExclude(parseInt(e.target.value) || 1)}
                                  className="w-16 px-2 py-1 border rounded text-center"
                                  min="1"
                                  max="10"
                                />
                                <span className="text-sm">z każdej płci</span>
                              </div>
                            )}
                          </div>

                          {/* Lista kategorii */}
                          <div className="space-y-3">
                            <div className="grid md:grid-cols-2 gap-4">
                              {/* Kategorie męskie */}
                              <div>
                                <h4 className="font-bold mb-3 text-blue-600">👨 Kategorie męskie</h4>
                                <div className="space-y-2">
                                  {ageCategories.filter(cat => cat.gender === 'M').map((cat, idx) => (
                                    <div key={cat.name} className="bg-white rounded p-3 border">
                                      <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                          <input
                                            type="text"
                                            value={cat.name}
                                            onChange={(e) => {
                                              const newCategories = [...ageCategories];
                                              const catIdx = newCategories.findIndex(c => c.name === cat.name);
                                              newCategories[catIdx].name = e.target.value;
                                              setAgeCategories(newCategories);
                                            }}
                                            className="w-16 px-2 py-1 border rounded text-center font-bold"
                                          />
                                          <span className="text-sm">wiek:</span>
                                          <input
                                            type="number"
                                            value={cat.minAge}
                                            onChange={(e) => {
                                              const newCategories = [...ageCategories];
                                              const catIdx = newCategories.findIndex(c => c.name === cat.name);
                                              newCategories[catIdx].minAge = parseInt(e.target.value) || 0;
                                              setAgeCategories(newCategories);
                                            }}
                                            className="w-16 px-2 py-1 border rounded text-center"
                                            min="0"
                                            max="99"
                                          />
                                          <span className="text-sm">-</span>
                                          <input
                                            type="number"
                                            value={cat.maxAge}
                                            onChange={(e) => {
                                              const newCategories = [...ageCategories];
                                              const catIdx = newCategories.findIndex(c => c.name === cat.name);
                                              newCategories[catIdx].maxAge = parseInt(e.target.value) || 99;
                                              setAgeCategories(newCategories);
                                            }}
                                            className="w-16 px-2 py-1 border rounded text-center"
                                            min="0"
                                            max="99"
                                          />
                                        </div>
                                        <button
                                          onClick={() => {
                                            const newCategories = ageCategories.filter(c => c.name !== cat.name);
                                            setAgeCategories(newCategories);
                                          }}
                                          className="text-red-600 hover:text-red-800"
                                          title="Usuń kategorię"
                                        >
                                          <Icons.Trash />
                                        </button>
                                      </div>
                                    </div>
                                  ))}
                                  <button
                                    onClick={() => {
                                      const newCategory = {
                                        name: 'M' + (new Date().getFullYear() - 2000),
                                        minAge: 18,
                                        maxAge: 99,
                                        gender: 'M'
                                      };
                                      setAgeCategories([...ageCategories, newCategory]);
                                    }}
                                    className="w-full p-2 border-2 border-dashed border-blue-300 rounded text-blue-600 hover:bg-blue-50"
                                  >
                                    <Icons.Plus className="w-4 h-4 mx-auto" />
                                    Dodaj kategorię męską
                                  </button>
                                </div>
                              </div>

                              {/* Kategorie kobiece */}
                              <div>
                                <h4 className="font-bold mb-3 text-pink-600">👩 Kategorie kobiece</h4>
                                <div className="space-y-2">
                                  {ageCategories.filter(cat => cat.gender === 'K').map((cat, idx) => (
                                    <div key={cat.name} className="bg-white rounded p-3 border">
                                      <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                          <input
                                            type="text"
                                            value={cat.name}
                                            onChange={(e) => {
                                              const newCategories = [...ageCategories];
                                              const catIdx = newCategories.findIndex(c => c.name === cat.name);
                                              newCategories[catIdx].name = e.target.value;
                                              setAgeCategories(newCategories);
                                            }}
                                            className="w-16 px-2 py-1 border rounded text-center font-bold text-pink-600"
                                          />
                                          <span className="text-sm">wiek:</span>
                                          <input
                                            type="number"
                                            value={cat.minAge}
                                            onChange={(e) => {
                                              const newCategories = [...ageCategories];
                                              const catIdx = newCategories.findIndex(c => c.name === cat.name);
                                              newCategories[catIdx].minAge = parseInt(e.target.value) || 0;
                                              setAgeCategories(newCategories);
                                            }}
                                            className="w-16 px-2 py-1 border rounded text-center"
                                            min="0"
                                            max="99"
                                          />
                                          <span className="text-sm">-</span>
                                          <input
                                            type="number"
                                            value={cat.maxAge}
                                            onChange={(e) => {
                                              const newCategories = [...ageCategories];
                                              const catIdx = newCategories.findIndex(c => c.name === cat.name);
                                              newCategories[catIdx].maxAge = parseInt(e.target.value) || 99;
                                              setAgeCategories(newCategories);
                                            }}
                                            className="w-16 px-2 py-1 border rounded text-center"
                                            min="0"
                                            max="99"
                                          />
                                        </div>
                                        <button
                                          onClick={() => {
                                            const newCategories = ageCategories.filter(c => c.name !== cat.name);
                                            setAgeCategories(newCategories);
                                          }}
                                          className="text-red-600 hover:text-red-800"
                                          title="Usuń kategorię"
                                        >
                                          <Icons.Trash />
                                        </button>
                                      </div>
                                    </div>
                                  ))}
                                  <button
                                    onClick={() => {
                                      const newCategory = {
                                        name: 'K' + (new Date().getFullYear() - 2000),
                                        minAge: 18,
                                        maxAge: 99,
                                        gender: 'K'
                                      };
                                      setAgeCategories([...ageCategories, newCategory]);
                                    }}
                                    className="w-full p-2 border-2 border-dashed border-pink-300 rounded text-pink-600 hover:bg-pink-50"
                                  >
                                    <Icons.Plus className="w-4 h-4 mx-auto" />
                                    Dodaj kategorię kobiecą
                                  </button>
                                </div>
                              </div>
                            </div>
                          </div>

                          <div className="mt-4 p-3 bg-blue-100 rounded text-sm">
                            <p><strong>💡 Wskazówka:</strong> Kategorie wiekowe są automatycznie obliczane na podstawie roku urodzenia w danych uczestników. Upewnij się, że dane zawierają kolumnę "birthYear" lub "yearOfBirth".</p>
                          </div>
                        </div>

                        {/* Inne ustawienia */}
                        <div className="bg-gray-50 border border-gray-200 rounded-lg p-6">
                          <h3 className="text-xl font-bold mb-4">🔧 Ustawienia techniczne</h3>
                          
                          <div className="grid md:grid-cols-2 gap-6">
                            {/* Auto-save */}
                            <div>
                              <div className="flex items-center gap-3 mb-2">
                                <input
                                  type="checkbox"
                                  id="autoSaveEnabled"
                                  checked={autoSaveEnabled}
                                  onChange={(e) => setAutoSaveEnabled(e.target.checked)}
                                  className="w-5 h-5"
                                />
                                <label htmlFor="autoSaveEnabled" className="font-semibold">
                                  Auto-zapis danych
                                </label>
                              </div>
                              <p className="text-sm text-gray-600">
                                Automatycznie zapisuje dane w przeglądarce co 30 sekund
                              </p>
                              {lastSaveTime && (
                                <p className="text-xs text-green-600 mt-1">
                                  Ostatni zapis: {new Date(lastSaveTime).toLocaleString('pl-PL')}
                                </p>
                              )}
                            </div>

                            {/* Format eksportu */}
                            <div>
                              <h4 className="font-semibold mb-2">📁 Format eksportu</h4>
                              <p className="text-sm text-gray-600">
                                Dane są eksportowane w formacie CSV z polskimi znakami (UTF-8)
                              </p>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        ReactDOM.render(<LapCounterApp />, document.getElementById('root'));
    </script>
</body>
</html>
