<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO&GO Lap - Wyniki na żywo</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: linear-gradient(135deg, #111827, #1e3a5f, #4a1d96); color: white; font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        /* HEADER */
        #hdr { background: rgba(0,0,0,0.45); padding: 10px 28px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); }
        #hdr .title { font-size: 20px; font-weight: 900; }
        #hdr .evname { font-size: 17px; font-weight: 700; color: #86efac; flex: 1; text-align: center; }
        #hdr .tlabel { font-size: 10px; color: #9ca3af; text-align: right; }
        #hdr .timer { font-size: 28px; font-family: monospace; font-weight: 900; color: #4ade80; }
        #hdr .live { margin-left: 12px; padding: 3px 9px; background: #dc2626; border-radius: 9999px; font-size: 11px; font-weight: 700; animation: pulse 2s infinite; }

        /* TABS */
        #tabs { display: flex; gap: 8px; padding: 7px 24px; background: rgba(0,0,0,0.25); border-bottom: 1px solid rgba(255,255,255,0.1); }
        #tabs button { padding: 6px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
        #tabs button.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.45); color: white; }
        #tabs button:hover { background: rgba(255,255,255,0.15); }

        /* CONTENT */
        #content { height: calc(100vh - 88px); overflow: hidden; padding: 12px 20px; }
        .sec { display: none; height: 100%; }
        .sec.active { display: flex; flex-direction: column; }

        /* RESULT ROWS */
        .row { display: flex; align-items: center; padding: 8px 12px; margin-bottom: 3px; background: rgba(255,255,255,0.07); border-radius: 8px; border-left: 4px solid #6b7280; }
        .row.M { border-left-color: #60a5fa; }
        .row.K { border-left-color: #f472b6; }
        .row .rpos { font-size: 15px; font-weight: 700; width: 32px; text-align: center; color: #9ca3af; }
        .row .rbib { font-size: 28px; font-weight: 900; width: 54px; text-align: center; }
        .row .rname { flex: 1; font-size: 15px; font-weight: 600; padding: 0 10px; }
        .row .rlaps { font-size: 26px; font-weight: 900; font-family: monospace; width: 52px; text-align: right; }
        .row .rdist { font-size: 13px; font-weight: 600; width: 76px; text-align: right; color: #d1d5db; }

        /* META PANEL */
        #meta-panel { background: rgba(245,158,11,0.1); border-radius: 10px; padding: 10px 12px; border: 1px solid rgba(245,158,11,0.3); width: 280px; min-width: 280px; overflow-y: auto; }
        #meta-panel h3 { font-size: 12px; font-weight: 700; color: #f59e0b; margin-bottom: 7px; }
        .mrow { display: flex; align-items: center; gap: 8px; padding: 5px 8px; margin-bottom: 3px; background: rgba(255,255,255,0.06); border-radius: 7px; border-left: 3px solid #f59e0b; }
        .mrow .mbib { font-size: 20px; font-weight: 900; width: 42px; text-align: center; }
        .mrow .mname { flex: 1; font-size: 13px; font-weight: 600; }
        .mrow .mlaps { font-size: 18px; font-weight: 900; font-family: monospace; color: #fbbf24; }

        /* TOP 5 */
        #top5-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .t5card { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.15); }
        .t5card h3 { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
        .t5row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; margin-bottom: 4px; background: rgba(255,255,255,0.07); border-radius: 7px; }
        .t5row .p { font-size: 14px; font-weight: 700; width: 22px; color: #9ca3af; }
        .t5row .b { font-size: 24px; font-weight: 900; width: 46px; text-align: center; }
        .t5row .n { flex: 1; font-size: 14px; font-weight: 600; }
        .t5row .l { font-size: 22px; font-weight: 900; font-family: monospace; }
        .t5row .d { font-size: 12px; color: #d1d5db; width: 64px; text-align: right; }

        /* STATUS */
        #status-bar { position: fixed; bottom: 10px; right: 14px; padding: 5px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }
        .sdot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    </style>
</head>
<body>
    <div id="hdr">
        <div class="title">YO&amp;GO Lap — Wyniki na żywo</div>
        <div class="evname" id="evname">—</div>
        <div><div class="tlabel">Czas od startu</div><div class="timer" id="timer">--:--:--</div></div>
        <div class="live">● LIVE</div>
    </div>

    <div id="tabs">
        <button class="active" onclick="sw('flow')">🏃 Wyniki na żywo</button>
        <button onclick="sw('stand')">📋 Klasyfikacja</button>
        <button onclick="sw('top5')">🏆 Top 5 kategorie</button>
    </div>

    <div id="content">
        <!-- Tab 1: flowing results + meta -->
        <div id="sec-flow" class="sec active">
            <div style="display:flex;gap:12px;height:100%;overflow:hidden">
                <div style="flex:1;overflow:hidden" id="flow-wrap"><div id="flow-list"></div></div>
                <div id="meta-panel"><h3>⏱ Meta</h3><div id="meta-list"></div></div>
            </div>
        </div>

        <!-- Tab 2: static standings -->
        <div id="sec-stand" class="sec">
            <div style="overflow-y:auto;height:100%" id="stand-list"></div>
        </div>

        <!-- Tab 3: top 5 by category -->
        <div id="sec-top5" class="sec">
            <div id="top5-grid">
                <div class="t5card" id="t5-men"><p style="color:#6b7280">Oczekiwanie...</p></div>
                <div class="t5card" id="t5-women"><p style="color:#6b7280">Oczekiwanie...</p></div>
            </div>
        </div>
    </div>

    <div id="status-bar">
        <div class="sdot" id="sdot" style="background:#eab308"></div>
        <span id="stext">Łączenie...</span>
    </div>

    <script>
        // ============================================================
        // Tryby: ?api=URL → HTTP polling | ?server=ws://... → WebSocket
        //        ?mode=local → BroadcastChannel (2. ekran lokalny)
        // ============================================================
        const params  = new URLSearchParams(window.location.search);
        const API_URL = params.get('api');
        const WS_URL  = params.get('server') || 'ws://192.168.1.100:3002';
        const LOCAL   = params.get('mode') === 'local';
        const MODE    = LOCAL ? 'local' : (API_URL ? 'http' : 'ws');
        const POLL_MS = 5000;

        let D = null;
        let view = 'flow';
        let flowRaf = null, flowPos = 0;
        let catIdx = 0, catTimer = null;

        // ---------- STATUS ----------
        function setStatus(state, text) {
            const col = state==='ok' ? '#22c55e' : state==='warn' ? '#eab308' : '#ef4444';
            document.getElementById('sdot').style.background = col;
            document.getElementById('stext').textContent = text;
        }

        // ---------- TAB SWITCH ----------
        function sw(v) {
            view = v;
            document.querySelectorAll('#tabs button').forEach((b,i)=>b.classList.toggle('active',['flow','stand','top5'][i]===v));
            document.querySelectorAll('.sec').forEach(s=>s.classList.remove('active'));
            document.getElementById('sec-'+v).classList.add('active');
            if (flowRaf) { cancelAnimationFrame(flowRaf); flowRaf = null; }
            if (catTimer) { clearInterval(catTimer); catTimer = null; }
            render();
            if (v==='flow') startFlow();
            if (v==='top5') startCat();
        }

        // ---------- ROW HTML ----------
        function rowHtml(r, i) {
            const g = r.gender || '';
            return `<div class="row ${g}"><div class="rpos">${i+1}</div><div class="rbib">${r.bib||'?'}</div><div class="rname">${r.firstName||''} ${r.lastName||''}</div><div class="rlaps">${r.laps||r.lapsCount||0}</div><div class="rdist">${parseFloat(r.distance||r.totalDistance||0).toFixed(2)} km</div></div>`;
        }

        // ---------- META HTML ----------
        function metaHtml(reads) {
            if (!reads || !reads.length) return '<p style="color:#6b7280;padding:10px;text-align:center">Brak odczytów</p>';
            return reads.map(r=>`<div class="mrow"><div class="mbib">${r.bib||'?'}</div><div class="mname">${r.firstName||''} ${r.lastName||''}</div><div class="mlaps">${r.laps||0}</div></div>`).join('');
        }

        // ---------- CATEGORIES ----------
        function getCategories(sorted) {
            const cats = new Set();
            sorted.forEach(r => { if (r.ageCategory) cats.add(r.ageCategory); });
            const list = [null]; // null = generalna
            cats.forEach(c => list.push(c));
            return list;
        }

        // ---------- TOP 5 CARD ----------
        function top5Card(title, athletes, color) {
            if (!athletes || !athletes.length)
                return `<div class="t5card" style="border-color:${color}40"><h3 style="color:${color}">${title}</h3><p style="color:#6b7280;padding:10px">Brak wyników</p></div>`;
            return `<div class="t5card" style="border-color:${color}40"><h3 style="color:${color}">${title}</h3>`
                + athletes.slice(0,5).map((r,i)=>`<div class="t5row"><div class="p">${i+1}.</div><div class="b">${r.bib||'?'}</div><div class="n">${r.firstName||''} ${r.lastName||''}</div><div class="l">${r.laps||r.lapsCount||0}</div><div class="d">${parseFloat(r.distance||r.totalDistance||0).toFixed(2)} km</div></div>`).join('')
                + `</div>`;
        }

        // ---------- RENDER ----------
        function render() {
            if (!D || !D.results) return;
            const sorted = [...D.results].sort((a,b)=>(b.laps||b.lapsCount||0)-(a.laps||a.lapsCount||0));
            if (D.eventName) document.getElementById('evname').textContent = D.eventName;

            if (view === 'flow') {
                document.getElementById('flow-list').innerHTML = sorted.map(rowHtml).join('');
                document.getElementById('meta-list').innerHTML = metaHtml(D.recentReads);
            }
            if (view === 'stand') {
                document.getElementById('stand-list').innerHTML = sorted.map(rowHtml).join('');
            }
            if (view === 'top5') {
                const cats = getCategories(sorted);
                const cat  = cats[catIdx % cats.length];
                const label = cat || 'Generalna';
                const men   = sorted.filter(r => r.gender==='M' && (cat===null || r.ageCategory===cat));
                const women = sorted.filter(r => r.gender==='K' && (cat===null || r.ageCategory===cat));
                document.getElementById('top5-grid').innerHTML =
                    top5Card('👨 Mężczyźni — ' + label, men, '#60a5fa') +
                    top5Card('👩 Kobiety — '   + label, women, '#f472b6');
            }
        }

        // ---------- AUTO SCROLL (tab 1) ----------
        function startFlow() {
            const wrap = document.getElementById('flow-wrap');
            flowPos = 0;
            function step() {
                flowPos += 0.6;
                const inner = document.getElementById('flow-list');
                if (inner && flowPos >= inner.offsetHeight - wrap.offsetHeight + 40) flowPos = 0;
                wrap.scrollTop = flowPos;
                flowRaf = requestAnimationFrame(step);
            }
            flowRaf = requestAnimationFrame(step);
        }

        // ---------- CATEGORY CYCLE (tab 3) ----------
        function startCat() {
            catTimer = setInterval(() => { catIdx++; render(); }, 10000);
        }

        // ---------- TIMER ----------
        function updateTimer() {
            if (!D || !D.gunStart) return;
            const gs = D.gunStart < 10000000000 ? D.gunStart*1000 : D.gunStart;
            const el = Math.floor((Date.now() - gs) / 1000);
            if (el < 0) return;
            document.getElementById('timer').textContent =
                String(Math.floor(el/3600)).padStart(2,'0') + ':' +
                String(Math.floor((el%3600)/60)).padStart(2,'0') + ':' +
                String(el%60).padStart(2,'0');
        }

        function applyData(data) { D = data; render(); }

        setInterval(updateTimer, 1000);
        sw('flow'); // init

        // ============================================================
        // CONNECTIONS
        // ============================================================

        // HTTP POLLING
        function pollHttp() {
            fetch(API_URL, { cache: 'no-store' })
                .then(r => r.json())
                .then(data => {
                    setStatus('ok', 'Online ✓ ' + new Date().toLocaleTimeString('pl-PL'));
                    if (data.type === 'results_update') applyData(data);
                })
                .catch(() => setStatus('err', 'Brak połączenia'));
        }

        // WEBSOCKET
        let ws = null;
        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.onopen  = () => { setStatus('ok', 'Połączono (WS)'); ws.send(JSON.stringify({type:'request_results'})); };
            ws.onmessage = e => { try { const d=JSON.parse(e.data); if(d.type==='results_update') applyData(d); } catch{} };
            ws.onclose = () => { setStatus('err', 'Rozłączono, ponawianie...'); setTimeout(connectWS, 3000); };
            ws.onerror = () => setStatus('err', 'Błąd WS');
        }

        // INIT
        if (MODE === 'local') {
            try { const s=localStorage.getItem('yogo_lap_data'); if(s) applyData(JSON.parse(s)); } catch(e){}
            const bc = new BroadcastChannel('yogo_lap_results');
            bc.onmessage = e => { if(e.data&&e.data.type==='results_update') applyData(e.data); };
            window.addEventListener('storage', e => { if(e.key==='yogo_lap_data'&&e.newValue){try{applyData(JSON.parse(e.newValue));}catch(err){}} });
            setStatus('ok', '2. ekran gotowy');
        } else if (MODE === 'http') {
            pollHttp();
            setInterval(pollHttp, POLL_MS);
        } else {
            connectWS();
            setInterval(() => { if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({type:'request_results'})); }, POLL_MS);
        }
    </script>
</body>
</html>
