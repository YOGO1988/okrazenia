<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YO&GO Lap - Wyniki na żywo</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: linear-gradient(135deg, #111827, #1e3a5f, #4a1d96); color: white; font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; }

        #ps-header { background: rgba(0,0,0,0.4); padding: 12px 28px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(8px); }
        #ps-header .title { font-size: 22px; font-weight: 900; }
        #ps-header .event { font-size: 18px; font-weight: 700; color: #86efac; flex: 1; text-align: center; }
        #ps-header .timer-block { text-align: right; }
        #ps-header .timer-label { font-size: 11px; color: #9ca3af; }
        #ps-header .timer { font-size: 30px; font-family: monospace; font-weight: 900; color: #4ade80; }

        #ps-tabs { display: flex; gap: 8px; padding: 8px 28px; background: rgba(0,0,0,0.25); border-bottom: 1px solid rgba(255,255,255,0.1); }
        #ps-tabs button { padding: 7px 18px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.5); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        #ps-tabs button.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.45); color: white; }
        #ps-tabs button:hover { background: rgba(255,255,255,0.15); }

        #ps-content { height: calc(100vh - 93px); overflow: hidden; padding: 14px 24px; }

        .ps-section { display: none; height: 100%; }
        .ps-section.active { display: flex; flex-direction: column; }

        /* TOP 5 CAROUSEL */
        #sec-carousel .top-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
        .top5-card { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 16px 20px; border: 1px solid rgba(255,255,255,0.15); min-height: 90px; display: flex; align-items: center; }
        #sec-carousel .list-wrap { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent; }

        /* SCROLL & LIST */
        #sec-scroll .scroll-outer { flex: 1; overflow: hidden; }
        #sec-list .list-wrap { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.3) transparent; }

        /* ROWS */
        .ps-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 14px; margin-bottom: 4px; background: rgba(255,255,255,0.07); border-radius: 9px; border-left: 4px solid #6b7280; }
        .ps-row.male { border-left-color: #60a5fa; }
        .ps-row.female { border-left-color: #f472b6; }
        .ps-row .left { display: flex; align-items: center; gap: 10px; }
        .ps-row .pos { font-size: 16px; font-weight: 700; width: 34px; text-align: center; color: #9ca3af; }
        .ps-row .bib { font-size: 30px; font-weight: 900; width: 56px; text-align: center; }
        .ps-row .name { font-size: 16px; font-weight: 600; }
        .ps-row .right { display: flex; align-items: center; gap: 20px; }
        .ps-row .laps { text-align: right; }
        .ps-row .laps .num { font-size: 28px; font-weight: 900; font-family: monospace; }
        .ps-row .laps .label { font-size: 10px; color: #9ca3af; }
        .ps-row .dist { font-size: 16px; font-weight: 700; width: 90px; text-align: right; color: #d1d5db; }

        /* TOP5 card inner */
        .card-inner { display: flex; align-items: center; gap: 14px; width: 100%; }
        .card-inner .c-pos { font-size: 20px; font-weight: 900; color: #d1d5db; min-width: 28px; }
        .card-inner .c-bib { font-size: 42px; font-weight: 900; min-width: 70px; text-align: center; }
        .card-inner .c-info { flex: 1; }
        .card-inner .c-name { font-size: 18px; font-weight: 700; }
        .card-inner .c-cat { font-size: 12px; color: #9ca3af; }
        .card-inner .c-stats { text-align: right; }
        .card-inner .c-laps { font-size: 34px; font-weight: 900; font-family: monospace; }
        .card-inner .c-label { font-size: 11px; color: #9ca3af; }
        .card-inner .c-dist { font-size: 16px; font-weight: 700; color: #d1d5db; }

        .live-badge { padding: 4px 10px; background: #dc2626; border-radius: 9999px; font-size: 12px; font-weight: 700; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        #status-bar { position: fixed; bottom: 10px; right: 14px; padding: 5px 12px; border-radius: 9999px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 2s infinite; }
        .dot-green { background: #22c55e; }
        .dot-red { background: #ef4444; }
        .dot-yellow { background: #eab308; }
    </style>
</head>
<body>
    <div id="ps-header">
        <div class="title">YO&amp;GO Lap — Wyniki na żywo</div>
        <div class="event" id="eventName">—</div>
        <div class="timer-block">
            <div class="timer-label">Czas od startu</div>
            <div class="timer" id="timer">--:--:--</div>
        </div>
        <div style="margin-left:16px"><span class="live-badge">● LIVE</span></div>
    </div>

    <div id="ps-tabs">
        <button class="active" onclick="psSwitch('carousel')">🏆 Top 5</button>
        <button onclick="psSwitch('scroll')">📜 Lista płynie</button>
        <button onclick="psSwitch('list')">📋 Pełna lista</button>
    </div>

    <div id="ps-content">
        <div id="sec-carousel" class="ps-section active">
            <div class="top-cards">
                <div class="top5-card" id="card-men" style="border-color:rgba(96,165,250,0.4)"><p style="color:#6b7280">Oczekiwanie...</p></div>
                <div class="top5-card" id="card-women" style="border-color:rgba(244,114,182,0.4)"><p style="color:#6b7280">Oczekiwanie...</p></div>
            </div>
            <div class="list-wrap" id="carousel-list"></div>
        </div>

        <div id="sec-scroll" class="ps-section">
            <div class="scroll-outer" id="scroll-outer">
                <div id="scroll-content"></div>
            </div>
        </div>

        <div id="sec-list" class="ps-section">
            <div class="list-wrap" id="list-content"></div>
        </div>
    </div>

    <div id="status-bar">
        <div class="status-dot dot-yellow" id="status-dot"></div>
        <span id="status-text">Łączenie...</span>
    </div>

    <script>
        // ============================================================
        // Tryby działania (URL params):
        //   ?api=https://twojadomena.pl/o_wyniki.php   → HTTP polling
        //   ?server=ws://192.168.1.x:3002              → WebSocket
        //   ?mode=local                                 → BroadcastChannel (2. ekran)
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const API_URL   = params.get('api');
        const WS_URL    = params.get('server') || 'ws://192.168.1.100:3002';
        const LOCAL     = params.get('mode') === 'local';
        const MODE      = LOCAL ? 'local' : (API_URL ? 'http' : 'ws');
        const POLL_MS   = 5000;

        let currentData  = null;
        let psView       = 'carousel';
        let carouselIdx  = 0;
        let carouselTick = null;
        let scrollRaf    = null;
        let scrollPos    = 0;

        // ---------- STATUS BAR ----------
        function setStatus(state, text) {
            const dot = document.getElementById('status-dot');
            dot.className = 'status-dot ' + (state === 'ok' ? 'dot-green' : state === 'warn' ? 'dot-yellow' : 'dot-red');
            document.getElementById('status-text').textContent = text;
        }

        // ---------- TAB SWITCH ----------
        function psSwitch(v) {
            psView = v;
            document.querySelectorAll('#ps-tabs button').forEach((b, i) => {
                b.classList.toggle('active', ['carousel','scroll','list'][i] === v);
            });
            ['carousel','scroll','list'].forEach(s => {
                const el = document.getElementById('sec-' + s);
                el.classList.toggle('active', s === v);
            });
            if (scrollRaf) { cancelAnimationFrame(scrollRaf); scrollRaf = null; }
            if (v === 'scroll') startScroll();
            renderAll();
        }

        // ---------- ROW HTML ----------
        function rowHtml(r, idx) {
            const bib  = r.bibNumber || r.bib || '?';
            const name = (r.firstName || '') + ' ' + (r.lastName || '');
            const laps = r.lapsCount || r.laps || 0;
            const dist = parseFloat(r.totalDistance || r.distance || 0).toFixed(2);
            const gc   = r.gender === 'K' ? 'female' : 'male';
            return `<div class="ps-row ${gc}">
                <div class="left">
                    <div class="pos">${idx+1}</div>
                    <div class="bib">${bib}</div>
                    <div class="name">${name.trim()}</div>
                </div>
                <div class="right">
                    <div class="laps"><div class="num">${laps}</div><div class="label">okrążenie</div></div>
                    <div class="dist">${dist} km</div>
                </div>
            </div>`;
        }

        // ---------- TOP CARD ----------
        function renderTopCard(elId, sorted, idx, color, labelColor) {
            const el = document.getElementById(elId);
            if (!sorted || sorted.length === 0) {
                el.innerHTML = '<p style="color:#6b7280;text-align:center;flex:1">Brak wyników</p>';
                return;
            }
            const pos = idx % sorted.length;
            const r   = sorted[pos];
            const laps = r.lapsCount || r.laps || 0;
            const dist = parseFloat(r.totalDistance || r.distance || 0).toFixed(2);
            const name = (r.firstName || '') + ' ' + (r.lastName || '');
            el.innerHTML = `<div class="card-inner">
                <div class="c-pos" style="color:${color}">${pos+1}.</div>
                <div class="c-bib">${r.bibNumber || r.bib || '?'}</div>
                <div class="c-info">
                    <div class="c-name" style="color:${labelColor}">${name.trim()}</div>
                    <div class="c-cat">${r.ageCategory || r.category || ''}</div>
                </div>
                <div class="c-stats">
                    <div class="c-laps">${laps}</div>
                    <div class="c-label">okrążenie</div>
                    <div class="c-dist">${dist} km</div>
                </div>
            </div>`;
        }

        // ---------- RENDER ----------
        function renderAll() {
            if (!currentData || !currentData.results) return;
            const sorted = [...currentData.results].sort((a,b) =>
                (b.lapsCount||b.laps||0) - (a.lapsCount||a.laps||0)
            );
            const men   = sorted.filter(r => r.gender === 'M');
            const women = sorted.filter(r => r.gender === 'K');
            const rows  = sorted.map(rowHtml).join('');

            if (psView === 'carousel') {
                renderTopCard('card-men',   men,   carouselIdx, '#93c5fd', '#93c5fd');
                renderTopCard('card-women', women, carouselIdx, '#f9a8d4', '#f9a8d4');
                document.getElementById('carousel-list').innerHTML = rows;
            }
            if (psView === 'scroll') {
                document.getElementById('scroll-content').innerHTML = rows;
            }
            if (psView === 'list') {
                document.getElementById('list-content').innerHTML = rows;
            }
        }

        // ---------- CAROUSEL TICK ----------
        function startCarousel() {
            if (carouselTick) clearInterval(carouselTick);
            carouselTick = setInterval(() => { carouselIdx++; renderAll(); }, 5000);
        }

        // ---------- AUTO SCROLL ----------
        function startScroll() {
            const outer = document.getElementById('scroll-outer');
            scrollPos = 0;
            function step() {
                scrollPos += 0.6;
                const inner = document.getElementById('scroll-content');
                if (inner && scrollPos >= inner.offsetHeight - outer.offsetHeight + 60) scrollPos = 0;
                outer.scrollTop = scrollPos;
                scrollRaf = requestAnimationFrame(step);
            }
            scrollRaf = requestAnimationFrame(step);
        }

        // ---------- TIMER ----------
        function updateTimer() {
            if (!currentData || !currentData.gunStart) return;
            const gs = currentData.gunStart < 10000000000 ? currentData.gunStart * 1000 : currentData.gunStart;
            const el = Math.floor((Date.now() - gs) / 1000);
            if (el < 0) return;
            document.getElementById('timer').textContent =
                String(Math.floor(el/3600)).padStart(2,'0') + ':' +
                String(Math.floor((el%3600)/60)).padStart(2,'0') + ':' +
                String(el%60).padStart(2,'0');
        }

        // ---------- APPLY DATA ----------
        function applyData(data) {
            currentData = data;
            if (data.eventName) document.getElementById('eventName').textContent = data.eventName;
            renderAll();
            updateTimer();
        }

        setInterval(updateTimer, 1000);
        startCarousel();

        // ============================================================
        // TRYBY POŁĄCZENIA
        // ============================================================

        // --- HTTP POLLING ---
        function pollHttp() {
            fetch(API_URL, { cache: 'no-store' })
                .then(r => r.json())
                .then(data => {
                    setStatus('ok', 'Online ✓ ' + new Date().toLocaleTimeString('pl-PL'));
                    if (data.type === 'results_update') applyData(data);
                })
                .catch(() => setStatus('err', 'Brak połączenia'));
        }

        // --- WEBSOCKET ---
        let ws = null;
        function connectWS() {
            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                setStatus('ok', 'Połączono (WS)');
                ws.send(JSON.stringify({ type: 'request_results' }));
            };
            ws.onmessage = e => {
                try {
                    const d = JSON.parse(e.data);
                    if (d.type === 'results_update') applyData(d);
                } catch {}
            };
            ws.onclose = () => {
                setStatus('err', 'Rozłączono, ponawianie...');
                setTimeout(connectWS, 3000);
            };
            ws.onerror = () => setStatus('err', 'Błąd WS');
        }

        // --- BROADCASTCHANNEL (lokalny 2. ekran) ---
        if (MODE === 'local') {
            const bc = new BroadcastChannel('yogo_lap_results');
            bc.onmessage = e => {
                if (e.data && e.data.type === 'results_update') applyData(e.data);
            };
            setStatus('ok', '2. ekran gotowy');
        } else if (MODE === 'http') {
            pollHttp();
            setInterval(pollHttp, POLL_MS);
            setStatus('warn', 'Łączenie...');
        } else {
            connectWS();
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'request_results' }));
                }
            }, POLL_MS);
        }
    </script>
</body>
</html>
